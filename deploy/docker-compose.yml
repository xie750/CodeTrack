services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codetrack
      POSTGRES_USER: codetrack
      POSTGRES_PASSWORD: codetrack
    volumes:
      - codetrack_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codetrack -d codetrack"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      CODETRACK_DATABASE_URL: postgresql+psycopg2://codetrack:codetrack@postgres:5432/codetrack
      CODETRACK_DEMO_USER_ID: user_student_001
      CODETRACK_SANDBOX_TIMEOUT_SECONDS: "3"
      CODETRACK_SANDBOX_SERVICE_URL: http://sandbox:8011
      CODETRACK_MODEL_GATEWAY_URL: ""
      CODETRACK_MODEL_API_KEY: ""
      CODETRACK_MODEL_API_BASE_URL: https://api.openai.com/v1
      CODETRACK_MODEL_NAME: ""
    depends_on:
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - app_net

  sandbox:
    image: codetrack-sandbox-runner:0.1
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    environment:
      CODETRACK_SANDBOX_EXECUTION_MODE: docker
      CODETRACK_SANDBOX_RUNNER_IMAGE: codetrack-sandbox-runner:0.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 256m
    cpus: 1.0
    networks:
      - app_net

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  codetrack_pg:

networks:
  app_net:
    internal: true
